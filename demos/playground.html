<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23050810'/%3E%3Cpath d='M18 20h28L22 44h24' fill='none' stroke='%234f8ef7' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <title>playground</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: radial-gradient(circle at top, #15274b 0%, #050810 60%); color: #e8eeff; }
      .app { min-height: 100vh; display: grid; grid-template-columns: 360px 1fr 360px; gap: 20px; padding: 20px; box-sizing: border-box; }
      .panel { background: rgba(13, 20, 34, 0.92); border: 1px solid rgba(255,255,255,.08); border-radius: 24px; padding: 20px; }
      .panel h2 { margin-top: 0; }
      .controls { display: grid; gap: 14px; }
      .group { display: grid; gap: 8px; padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,.06); }
      .group:last-child { border-bottom: 0; }
      .scene-shell { position: relative; overflow: hidden; }
      #scene { min-height: calc(100vh - 40px); display: grid; grid-template-columns: repeat(2, minmax(0, 220px)); place-content: center; gap: 24px; padding: 32px; }
      .card { padding: 24px; border-radius: 20px; background: rgba(27, 38, 62, 0.96); border: 1px solid rgba(255,255,255,.12); position: relative; z-index: 2; }
      .light { position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #ffd76a; box-shadow: 0 0 24px rgba(255, 215, 106, 0.85); cursor: grab; z-index: 3; touch-action: none; }
      .floor { position: absolute; inset: auto 8% 8% 8%; height: 260px; border-radius: 50%; background:
        radial-gradient(circle at center, rgba(255,255,255,.08), rgba(255,255,255,0) 60%),
        radial-gradient(circle at center, rgba(6, 10, 18, .94), rgba(6, 10, 18, 0) 72%);
        border: 1px solid rgba(255,255,255,.06); transform: perspective(900px) rotateX(72deg); transform-origin: center; z-index: 1;
      }
      .code { white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.5; }
      button { border: 0; border-radius: 12px; padding: 10px 12px; background: #4f8ef7; color: white; cursor: pointer; }
      input[type="range"] { width: 100%; }
      .row { display: grid; gap: 6px; }
      .mini { font-size: 12px; color: #9ebfff; }
      .stats { display: grid; gap: 8px; margin-top: 12px; }
      .stat { padding: 10px 12px; border-radius: 14px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06); font-size: 13px; }
      @media (max-width: 1200px) {
        .app { grid-template-columns: 1fr; }
        #scene { min-height: 60vh; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h2>Controls</h2>
        <div class="controls">
          <div class="group">
            <label>Perspective: <strong id="perspectiveValue">1000</strong>px</label>
            <input id="perspectiveRange" type="range" min="500" max="2000" value="1000" step="50" />
            <label>Hover response: <strong id="hoverRangeValue">72</strong>px</label>
            <input id="hoverRange" type="range" min="20" max="160" value="72" step="4" />
            <label>Hover velocity: <strong id="hoverVelocityValue">0.50</strong></label>
            <input id="hoverVelocity" type="range" min="0.1" max="1.2" value="0.5" step="0.05" />
            <label>Z-scroll speed: <strong id="scrollSpeedValue">0.45</strong></label>
            <input id="scrollSpeed" type="range" min="0.1" max="1.2" value="0.45" step="0.05" />
          </div>
          <div class="group">
            <label><input id="hoverToggle" type="checkbox" checked /> Enable hover</label>
            <label><input id="scrollToggle" type="checkbox" checked /> Enable z-scroll</label>
            <label><input id="shadowToggle" type="checkbox" checked /> Enable shadows</label>
          </div>
          <div class="group">
            <label>Light intensity: <strong id="lightIntensityValue">1.30</strong></label>
            <input id="lightIntensity" type="range" min="0.4" max="2" value="1.3" step="0.05" />
            <label>Light depth: <strong id="lightDepthValue">600</strong>px</label>
            <input id="lightDepth" type="range" min="260" max="1200" value="600" step="20" />
            <div class="mini">Arrastrá el punto de luz para mover X e Y. Estos sliders afinan Z e intensidad.</div>
          </div>
          <div class="group">
            <button id="addCard">+ Add element</button>
          </div>
          <div class="group" id="cardControls"></div>
          <div class="stats">
            <div class="stat" id="activeModules"></div>
            <div class="stat" id="lightSummary"></div>
          </div>
        </div>
      </section>
      <section class="panel scene-shell">
        <div class="floor"></div>
        <div class="light" id="light"></div>
        <section id="scene"></section>
      </section>
      <section class="panel">
        <h2>Generated code</h2>
        <div class="code" id="codeOutput"></div>
      </section>
    </main>
    <script src="../dist/spatial-web.iife.js"></script>
    <script>
      const scene = document.getElementById('scene')
      const lightEl = document.getElementById('light')
      const cardControls = document.getElementById('cardControls')
      const codeOutput = document.getElementById('codeOutput')
      const perspectiveRange = document.getElementById('perspectiveRange')
      const perspectiveValue = document.getElementById('perspectiveValue')
      const hoverRange = document.getElementById('hoverRange')
      const hoverRangeValue = document.getElementById('hoverRangeValue')
      const hoverVelocity = document.getElementById('hoverVelocity')
      const hoverVelocityValue = document.getElementById('hoverVelocityValue')
      const scrollSpeed = document.getElementById('scrollSpeed')
      const scrollSpeedValue = document.getElementById('scrollSpeedValue')
      const hoverToggle = document.getElementById('hoverToggle')
      const scrollToggle = document.getElementById('scrollToggle')
      const shadowToggle = document.getElementById('shadowToggle')
      const lightIntensity = document.getElementById('lightIntensity')
      const lightIntensityValue = document.getElementById('lightIntensityValue')
      const lightDepth = document.getElementById('lightDepth')
      const lightDepthValue = document.getElementById('lightDepthValue')
      const activeModules = document.getElementById('activeModules')
      const lightSummary = document.getElementById('lightSummary')
      const addCard = document.getElementById('addCard')

      let runtime = null
      let cards = [-120, -20, 80, 180]
      const lightState = { x: 180, y: -120, z: 600, intensity: 1.3 }

      const renderControls = () => {
        cardControls.innerHTML = ''
        cards.forEach((depth, index) => {
          const row = document.createElement('div')
          row.className = 'row'
          row.innerHTML = `
            <label>Element ${index + 1}: <strong>${depth}</strong></label>
            <input type="range" min="-300" max="300" step="20" value="${depth}" data-index="${index}" />
          `
          cardControls.appendChild(row)
        })
      }

      const renderScene = () => {
        scene.innerHTML = ''
        cards.forEach((depth, index) => {
          const card = document.createElement('article')
          card.className = 'card'
          card.dataset.depth = String(depth)
          card.innerHTML = `<strong>Element ${index + 1}</strong><p>data-depth="${depth}"</p>`
          scene.appendChild(card)
        })
      }

      const renderLight = () => {
        const rect = scene.getBoundingClientRect()
        lightEl.style.left = `${rect.width / 2 + lightState.x - 9}px`
        lightEl.style.top = `${rect.height / 2 + lightState.y - 9}px`
      }

      const updateCode = () => {
        const html = cards.map((depth, index) => `  <div data-depth="${depth}">Element ${index + 1}</div>`).join('\n')
        const lines = [
          `<div id="scene">`,
          html,
          `</div>`,
          ``,
          `const scene = new DepthLayout('#scene', { perspective: ${perspectiveRange.value} })`
        ]
        if (hoverToggle.checked) lines.push(`scene.enableDepthHover({ responseRange: ${hoverRange.value}, velocityFactor: ${Number(hoverVelocity.value).toFixed(2)} })`)
        if (scrollToggle.checked) lines.push(`scene.enableDepthScroll({ axis: 'mixed', speed: ${Number(scrollSpeed.value).toFixed(2)} })`)
        if (shadowToggle.checked) lines.push(`scene.setLight({ x: ${Math.round(lightState.x)}, y: ${Math.round(lightState.y)}, z: ${Math.round(lightState.z)}, intensity: ${Number(lightState.intensity).toFixed(2)} })`)
        codeOutput.textContent = lines.join('\n')
      }

      const updateTelemetry = () => {
        const enabled = [
          hoverToggle.checked ? `hover ${hoverRange.value}px / ${Number(hoverVelocity.value).toFixed(2)}` : null,
          scrollToggle.checked ? `z-scroll ${Number(scrollSpeed.value).toFixed(2)}` : null,
          shadowToggle.checked ? `shadows on` : null
        ].filter(Boolean)
        activeModules.textContent = `Modules: ${enabled.length ? enabled.join(' | ') : 'layout only'}`
        lightSummary.textContent = `Light: x ${Math.round(lightState.x)} | y ${Math.round(lightState.y)} | z ${Math.round(lightState.z)} | intensity ${Number(lightState.intensity).toFixed(2)}`
      }

      const mount = () => {
        renderScene()
        runtime?.destroy()
        runtime = new SpatialWeb.DepthLayout('#scene', {
          perspective: Number(perspectiveRange.value),
          depthRange: [-300, 300]
        })
        if (hoverToggle.checked) runtime.enableDepthHover({ responseRange: Number(hoverRange.value), velocityFactor: Number(hoverVelocity.value), returnEasing: 'spring' })
        if (scrollToggle.checked) runtime.enableDepthScroll({ axis: 'mixed', speed: Number(scrollSpeed.value), easing: 'spring' })
        if (shadowToggle.checked) runtime.setLight(lightState)
        perspectiveValue.textContent = perspectiveRange.value
        hoverRangeValue.textContent = hoverRange.value
        hoverVelocityValue.textContent = Number(hoverVelocity.value).toFixed(2)
        scrollSpeedValue.textContent = Number(scrollSpeed.value).toFixed(2)
        lightIntensityValue.textContent = Number(lightIntensity.value).toFixed(2)
        lightDepthValue.textContent = lightDepth.value
        renderLight()
        updateTelemetry()
        updateCode()
      }

      perspectiveRange.addEventListener('input', mount)
      hoverRange.addEventListener('input', mount)
      hoverVelocity.addEventListener('input', mount)
      scrollSpeed.addEventListener('input', mount)
      hoverToggle.addEventListener('change', mount)
      scrollToggle.addEventListener('change', mount)
      shadowToggle.addEventListener('change', mount)
      lightIntensity.addEventListener('input', () => {
        lightState.intensity = Number(lightIntensity.value)
        mount()
      })
      lightDepth.addEventListener('input', () => {
        lightState.z = Number(lightDepth.value)
        mount()
      })
      addCard.addEventListener('click', () => {
        cards.push(Math.min(300, -160 + cards.length * 80))
        renderControls()
        mount()
      })

      cardControls.addEventListener('input', (event) => {
        const target = event.target
        if (!(target instanceof HTMLInputElement)) return
        const index = Number(target.dataset.index)
        cards[index] = Number(target.value)
        renderControls()
        mount()
      })

      let dragging = false
      lightEl.addEventListener('pointerdown', (event) => {
        dragging = true
        lightEl.setPointerCapture(event.pointerId)
      })
      lightEl.addEventListener('pointermove', (event) => {
        if (!dragging) return
        const rect = scene.getBoundingClientRect()
        lightState.x = event.clientX - rect.left - rect.width / 2
        lightState.y = event.clientY - rect.top - rect.height / 2
        if (shadowToggle.checked) mount()
      })
      lightEl.addEventListener('pointerup', () => {
        dragging = false
      })

      window.addEventListener('resize', renderLight)
      renderControls()
      mount()
    </script>
  </body>
</html>
